<div class="min-h-screen bg-zinc-950 flex">

  <!-- Partie gauche – branding -->
  <div class="hidden lg:flex w-1/2 relative overflow-hidden">
    <img
      src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200&q=80"
      alt="car"
      class="absolute inset-0 w-full h-full object-cover opacity-60"
    />
    <div class="absolute inset-0 bg-gradient-to-r from-zinc-950 via-zinc-950/60 to-transparent"></div>
    <div class="relative z-10 flex flex-col justify-end p-12 pb-16">
      <h1 class="text-5xl font-black text-white tracking-tight leading-tight">
        Rejoignez<br/>
        <span class="text-red-500">DalasCars.</span>
      </h1>
      <p class="text-zinc-400 mt-4 text-lg max-w-sm">
        Créez votre compte et publiez votre première annonce en moins de 2 minutes.
      </p>
    </div>
  </div>

  <!-- Partie droite – formulaire -->
  <div class="w-full lg:w-1/2 flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md">

      <!-- Logo -->
      <div class="mb-8">
        <span class="text-3xl font-black text-white tracking-tight">
          Dalas<span class="text-red-500">Cars</span>
        </span>
        <p class="text-zinc-500 mt-2 text-sm">Créez votre compte gratuitement</p>
      </div>

      <!-- Erreur -->
      <div *ngIf="error"
           class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl mb-6 text-sm flex items-center gap-2">
        <span>⚠</span> {{ error }}
      </div>

      <!-- Formulaire -->
      <form (ngSubmit)="onSubmit()" class="space-y-4">

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-2">
              Prénom
            </label>
            <input
              type="text"
              [(ngModel)]="firstName"
              name="firstName"
              required
              placeholder="John"
              class="w-full bg-zinc-900 border border-zinc-800 text-white placeholder-zinc-600 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition"
            />
          </div>
          <div>
            <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-2">
              Nom
            </label>
            <input
              type="text"
              [(ngModel)]="lastName"
              name="lastName"
              required
              placeholder="Doe"
              class="w-full bg-zinc-900 border border-zinc-800 text-white placeholder-zinc-600 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition"
            />
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-2">
            Email
          </label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            placeholder="votre@email.com"
            class="w-full bg-zinc-900 border border-zinc-800 text-white placeholder-zinc-600 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-2">
            Mot de passe
          </label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full bg-zinc-900 border border-zinc-800 text-white placeholder-zinc-600 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition"
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-2">
              Téléphone
            </label>
            <input
              type="tel"
              [(ngModel)]="phone"
              name="phone"
              placeholder="0470000000"
              class="w-full bg-zinc-900 border border-zinc-800 text-white placeholder-zinc-600 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition"
            />
          </div>
          <div>
            <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-2">
              Ville
            </label>
            <input
              type="text"
              [(ngModel)]="city"
              name="city"
              placeholder="Bruxelles"
              class="w-full bg-zinc-900 border border-zinc-800 text-white placeholder-zinc-600 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white font-bold py-3 rounded-xl transition duration-200 tracking-wide mt-2"
        >
          {{ loading ? 'Inscription...' : "Créer mon compte" }}
        </button>

      </form>

      <!-- Séparateur -->
      <div class="flex items-center my-6">
        <div class="flex-1 h-px bg-zinc-800"></div>
        <span class="text-zinc-600 text-xs px-4 uppercase tracking-widest">ou</span>
        <div class="flex-1 h-px bg-zinc-800"></div>
      </div>

      <!-- Lien login -->
      <p class="text-center text-zinc-500 text-sm">
        Déjà un compte ?
        <a routerLink="/login" class="text-red-500 font-semibold hover:text-red-400 transition">
          Se connecter
        </a>
      </p>

    </div>
  </div>

</div>
